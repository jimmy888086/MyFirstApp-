name: Build APK
on:
  push:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Generate Android project
        run: |
          mkdir -p app/src/main/java/com/example/myfirstapp
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          
          cat > app/src/main/AndroidManifest.xml <<'EOF'
<?xml version="1.0" encoding="utf-8"?>
<manifest xmlns:android="http://schemas.android.com/apk/res/android"
    package="com.example.myfirstapp">
    <application android:label="MyFirstApp">
        <activity android:name=".MainActivity">
            <intent-filter>
                <action android:name="android.intent.action.MAIN" />
                <category android:name="android.intent.category.LAUNCHER" />
            </intent-filter>
        </activity>
    </application>
</manifest>
EOF
          
          cat > app/src/main/java/com/example/myfirstapp/MainActivity.java <<'EOF'
package com.example.myfirstapp;
import android.app.Activity;
import android.os.Bundle;
import android.widget.TextView;
public class MainActivity extends Activity {
    @Override
    protected void onCreate(Bundle savedInstanceState) {
        super.onCreate(savedInstanceState);
        TextView tv = new TextView(this);
        tv.setText("Hello from Claude!");
        setContentView(tv);
    }
}
EOF
          
          cat > app/src/main/res/values/strings.xml <<'EOF'
<resources>
    <string name="app_name">MyFirstApp</string>
</resources>
EOF
          
          cat > app/src/main/res/layout/activity_main.xml <<'EOF'
<?xml version="1.0" encoding="utf-8"?>
<LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
    android:layout_width="match_parent"
    android:layout_height="match_parent"
    android:orientation="vertical">
    <TextView
        android:layout_width="wrap_content"
        android:layout_height="wrap_content"
        android:text="Hello"/>
</LinearLayout>
EOF
          
          cat > build.gradle <<'EOF'
buildscript {
    repositories { google(); mavenCentral() }
    dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
}
allprojects {
    repositories { google(); mavenCentral() }
}
EOF
          
          cat > settings.gradle <<'EOF'
rootProject.name = "MyFirstApp"
include ':app'
EOF
          
          cat > app/build.gradle <<'EOF'
plugins { id 'com.android.application' }
android {
    namespace 'com.example.myfirstapp'
    compileSdk 34
    defaultConfig {
        applicationId "com.example.myfirstapp"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }
    buildTypes { debug { debuggable true } }
}
dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
EOF
          
          cat > gradle.properties <<'EOF'
org.gradle.jvmargs=-Xmx2048m
android.useAndroidX=true
android.enableJetifier=true
EOF
      
      - name: Build APK
        run: gradle assembleDebug --no-daemon
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MyFirstApp-debug
          path: app/build/outputs/apk/debug/*.apk
