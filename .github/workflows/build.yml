name: Build APK
on:
  push:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Android project
        run: |
          mkdir -p app/src/main/java/com/example/myfirstapp
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

          echo '<?xml version="1.0" encoding="utf-8"?>' > app/src/main/AndroidManifest.xml
          echo '<manifest xmlns:android="http://schemas.android.com/apk/res/android"' >> app/src/main/AndroidManifest.xml
          echo '    package="com.example.myfirstapp">' >> app/src/main/AndroidManifest.xml
          echo '    <application android:label="MyFirstApp">' >> app/src/main/AndroidManifest.xml
          echo '        <activity android:name=".MainActivity">' >> app/src/main/AndroidManifest.xml
          echo '            <intent-filter>' >> app/src/main/AndroidManifest.xml
          echo '                <action android:name="android.intent.action.MAIN" />' >> app/src/main/AndroidManifest.xml
          echo '                <category android:name="android.intent.category.LAUNCHER" />' >> app/src/main/AndroidManifest.xml
          echo '            </intent-filter>' >> app/src/main/AndroidManifest.xml
          echo '        </activity>' >> app/src/main/AndroidManifest.xml
          echo '    </application>' >> app/src/main/AndroidManifest.xml
          echo '</manifest>' >> app/src/main/AndroidManifest.xml

          echo 'package com.example.myfirstapp;' > app/src/main/java/com/example/myfirstapp/MainActivity.java
          echo 'import android.app.Activity;' >> app/src/main/java/com/example/myfirstapp/MainActivity.java
          echo 'import android.os.Bundle;' >> app/src/main/java/com/example/myfirstapp/MainActivity.java
          echo 'import android.widget.TextView;' >> app/src/main/java/com/example/myfirstapp/MainActivity.java
          echo 'public class MainActivity extends Activity {' >> app/src/main/java/com/example/myfirstapp/MainActivity.java
          echo '    @Override' >> app/src/main/java/com/example/myfirstapp/MainActivity.java
          echo '    protected void onCreate(Bundle savedInstanceState) {' >> app/src/main/java/com/example/myfirstapp/MainActivity.java
          echo '        super.onCreate(savedInstanceState);' >> app/src/main/java/com/example/myfirstapp/MainActivity.java
          echo '        TextView tv = new TextView(this);' >> app/src/main/java/com/example/myfirstapp/MainActivity.java
          echo '        tv.setText("Hello from Claude!");' >> app/src/main/java/com/example/myfirstapp/MainActivity.java
          echo '        setContentView(tv);' >> app/src/main/java/com/example/myfirstapp/MainActivity.java
          echo '    }' >> app/src/main/java/com/example/myfirstapp/MainActivity.java
          echo '}' >> app/src/main/java/com/example/myfirstapp/MainActivity.java

          echo '<resources>' > app/src/main/res/values/strings.xml
          echo '    <string name="app_name">MyFirstApp</string>' >> app/src/main/res/values/strings.xml
          echo '</resources>' >> app/src/main/res/values/strings.xml

          echo '<?xml version="1.0" encoding="utf-8"?>' > app/src/main/res/layout/activity_main.xml
          echo '<LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"' >> app/src/main/res/layout/activity_main.xml
          echo '    android:layout_width="match_parent"' >> app/src/main/res/layout/activity_main.xml
          echo '    android:layout_height="match_parent"' >> app/src/main/res/layout/activity_main.xml
          echo '    android:orientation="vertical">' >> app/src/main/res/layout/activity_main.xml
          echo '    <TextView' >> app/src/main/res/layout/activity_main.xml
          echo '        android:layout_width="wrap_content"' >> app/src/main/res/layout/activity_main.xml
          echo '        android:layout_height="wrap_content"' >> app/src/main/res/layout/activity_main.xml
          echo '        android:text="Hello"/>' >> app/src/main/res/layout/activity_main.xml
          echo '</LinearLayout>' >> app/src/main/res/layout/activity_main.xml

          echo 'buildscript {' > build.gradle
          echo '    repositories { google(); mavenCentral() }' >> build.gradle
          echo '    dependencies { classpath "com.android.tools.build:gradle:8.2.2" }' >> build.gradle
          echo '}' >> build.gradle
          echo 'allprojects {' >> build.gradle
          echo '    repositories { google(); mavenCentral() }' >> build.gradle
          echo '}' >> build.gradle

          echo 'rootProject.name = "MyFirstApp"' > settings.gradle
          echo 'include ":app"' >> settings.gradle

          echo 'plugins {' > app/build.gradle
          echo '    id "com.android.application"' >> app/build.gradle
          echo '}' >> app/build.gradle
          echo 'android {' >> app/build.gradle
          echo '    namespace "com.example.myfirstapp"' >> app/build.gradle
          echo '    compileSdk 34' >> app/build.gradle
          echo '    defaultConfig {' >> app/build.gradle
          echo '        applicationId "com.example.myfirstapp"' >> app/build.gradle
          echo '        minSdk 21' >> app/build.gradle
          echo '        targetSdk 34' >> app/build.gradle
          echo '        versionCode 1' >> app/build.gradle
          echo '        versionName "1.0"' >> app/build.gradle
          echo '    }' >> app/build.gradle
          echo '    buildTypes { debug { debuggable true } }' >> app/build.gradle
          echo '}' >> app/build.gradle
          echo 'dependencies {' >> app/build.gradle
          echo '    implementation "androidx.appcompat:appcompat:1.6.1"' >> app/build.gradle
          echo '}' >> app/build.gradle

          echo 'org.gradle.jvmargs=-Xmx2048m' > gradle.properties
          echo 'android.useAndroidX=true' >> gradle.properties
          echo 'android.enableJetifier=true' >> gradle.properties

      - name: Build APK
        run: gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MyFirstApp-debug
          path: app/build/outputs/apk/debug/*.apk
